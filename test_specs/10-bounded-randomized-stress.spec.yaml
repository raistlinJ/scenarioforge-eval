name: "bounded-randomized-stress"
iterations: 5
topology:
  routers: [1, 4]
  hosts: [6, 10]
  randomize: true
services:
  enabled: true
  randomize: true
  count: [2, 6]
  include: ["SSH", "HTTP"]
vulns:
  enabled: true
  randomize: true
  count: [2, 5]
flows:
  enabled: true
  randomize: true
  chain_length: [1, 4]
  allow_duplicates: false
segmentation:
  enabled: false
hitl:
  use_env: false
validation:
  policy: "strict"
